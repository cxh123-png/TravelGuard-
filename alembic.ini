# Alembic configuration file for TravelGuard database migrations.
[alembic]
# script_location tells Alembic where migration environment files live.
script_location = alembic
# prepend_sys_path makes repository root importable when Alembic runs from CLI.
prepend_sys_path = .
# sqlalchemy.url is kept as a placeholder because env.py reads DATABASE_URL from Settings.
sqlalchemy.url = postgresql+asyncpg://travelguard:travelguard@127.0.0.1:5432/travelguard

[loggers]
# Alembic logging channels used by the default migration runner.
keys = root,sqlalchemy,alembic

[handlers]
# Console handler keeps migration logs visible in the terminal.
keys = console

[formatters]
# Generic formatter keeps migration log lines compact and readable.
keys = generic

[logger_root]
# Root logger level controls generic Alembic command output.
level = WARN
# Root logger writes to the console handler.
handlers = console
# Root logger has no qualifier.
qualname =

[logger_sqlalchemy]
# SQLAlchemy logger is quiet by default unless database_echo is enabled elsewhere.
level = WARN
# SQLAlchemy logger writes to the console handler.
handlers =
# SQLAlchemy logger qualifier.
qualname = sqlalchemy.engine

[logger_alembic]
# Alembic logger shows migration progress.
level = INFO
# Alembic logger writes to the console handler.
handlers =
# Alembic logger qualifier.
qualname = alembic

[handler_console]
# Console handler writes log records to stderr.
class = StreamHandler
# Console handler arguments use sys.stderr.
args = (sys.stderr,)
# Console handler level accepts all records passed by loggers.
level = NOTSET
# Console handler uses the generic formatter below.
formatter = generic

[formatter_generic]
# Log format includes level, logger name, and message.
format = %(levelname)-5.5s [%(name)s] %(message)s
# Date format is unused by this compact formatter.
datefmt = %H:%M:%S
